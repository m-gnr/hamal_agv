

ekf_filter_node:
  ros__parameters:
    use_sim_time: false

    # EKF update rate
    frequency: 50.0
    sensor_timeout: 0.1

    # 2D mobile base
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false

    # Frame convention (HAMALS)
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # -----------------------
    # ODOM0: /odom_raw (twist-only)
    # -----------------------
    odom0: /odom_raw
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # [x, y, z,
    #  roll, pitch, yaw,
    #  vx, vy, vz,
    #  vroll, vpitch, vyaw,
    #  ax, ay, az]
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]

    # -----------------------
    # IMU0: /imu/data (gz-only)
    # -----------------------
    imu0: /imu/data
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]